<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Hashing Demo</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #000000;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
      padding: 20px;
      box-sizing: border-box;
    }

    .input-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #111111;
      border-bottom: 1px solid #333;
      padding: 40px 20px;
      min-height: 40vh;
    }

    .input-section h1 {
      margin: 0 0 1.5rem 0;
      font-size: 2rem;
      color: #ffffff;
      text-align: center;
    }

    .input-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.2rem;
      width: 100%;
      max-width: 760px;
    }

    #userInput {
      width: 100%;
      padding: 16px 18px;
      font-size: 1.1rem;
      background: #1a1a1a;
      color: #ffffff;
      border: 2px solid #444;
      border-radius: 6px;
      box-sizing: border-box;
    }

    #userInput:focus {
      outline: none;
      border-color: #4caf50;
      box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.25);
    }

    button {
      padding: 14px 40px;
      font-size: 1.1rem;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    button:hover {
      background: #45a049;
      transform: translateY(-1px);
    }

    .error {
      color: #ff7373;
      min-height: 20px;
      margin: 0;
    }

    .results-section {
      flex: 1;
      display: flex;
      min-height: 40vh;
    }

    .result-box {
      flex: 1;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      border-right: 1px solid #333;
      background: #0d0d0d;
    }

    .result-box:last-child {
      border-right: none;
    }

    .result-box h2 {
      margin: 0;
      font-size: 1.8rem;
      color: #4caf50;
    }

    .result-value {
      font-family: "Courier New", Courier, monospace;
      font-size: 1.05rem;
      color: #d0ffd0;
      background: #111111;
      padding: 14px 16px;
      border-radius: 6px;
      min-height: 100px;
      word-break: break-all;
      white-space: pre-wrap;
      border: 1px solid #222;
    }

    .result-meta {
      font-size: 0.85rem;
      color: #b7b7b7;
      line-height: 1.4;
      min-height: 40px;
    }

    @media (max-width: 768px) {
      .results-section {
        flex-direction: column;
      }
      .result-box {
        border-right: none;
        border-bottom: 1px solid #333;
      }
      .result-box:last-child {
        border-bottom: none;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="input-section">
      <h1>Password Hashing Demo</h1>
      <div class="input-group">
        <input
          id="userInput"
          type="text"
          placeholder="Enter a password or leave this blank for a generated password"
          autocomplete="off"
        />
        <button id="submitBtn" type="button">Submit</button>
        <p id="error" class="error"></p>
      </div>
    </section>

    <section class="results-section">
      <div class="result-box">
        <h2>MD5</h2>
        <div id="md5" class="result-value">-</div>
        <div id="md5Meta" class="result-meta"></div>
      </div>
      <div class="result-box">
        <h2>SHA-256</h2>
        <div id="sha256" class="result-value">-</div>
        <div id="sha256Meta" class="result-meta"></div>
      </div>
      <div class="result-box">
        <h2>bcrypt</h2>
        <div id="bcrypt" class="result-value">-</div>
        <div id="bcryptMeta" class="result-meta"></div>
      </div>
    </section>
  </div>

  <script>
    async function sendData() {
      const input = document.getElementById("userInput");
      const password = input.value.trim();
      const errorEl = document.getElementById("error");
      const btn = document.getElementById("submitBtn");

      errorEl.textContent = "";
      btn.disabled = true;
      btn.textContent = "Running...";

      try {
        const options = password
          ? {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password })
            }
          : {};

        const response = await fetch("/api/compare", options);
        if (!response.ok) {
          throw new Error("Server replied " + response.status);
        }

        const data = await response.json();

        document.getElementById("md5").innerText = data.md5_hash || "N/A";
        document.getElementById("sha256").innerText = data.sha256_hash || "N/A";
        document.getElementById("bcrypt").innerText = data.bcrypt_hash || "N/A";

        document.getElementById("md5Meta").innerText =
          "Password used: " + data.password + "\n" +
          "Time: " + data.md5.time_seconds + "s | Rate: " + data.md5.hashes_per_second + "/s";

        document.getElementById("sha256Meta").innerText =
          "Password used: " + data.password + "\n" +
          "Time: " + data.sha256.time_seconds + "s | Rate: " + data.sha256.hashes_per_second + "/s";

        document.getElementById("bcryptMeta").innerText =
          "Password used: " + data.password + "\n" +
          "Time: " + data.bcrypt.time_seconds + "s | Rate: " + data.bcrypt.hashes_per_second + "/s";
      } catch (err) {
        errorEl.textContent = "Error: " + err.message;
      } finally {
        btn.disabled = false;
        btn.textContent = "Submit";
      }
    }

    document.getElementById("submitBtn").addEventListener("click", sendData);
    document.getElementById("userInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter") {
        sendData();
      }
    });
  </script>
</body>
</html>
